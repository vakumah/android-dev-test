<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android ARM64 Controller</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            color: #e2e8f0;
        }
        .container {
            display: grid;
            grid-template-columns: 400px 1fr;
            height: 100vh;
            gap: 0;
        }
        .sidebar {
            background: #1e293b;
            border-right: 1px solid #334155;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #334155;
        }
        .header h1 { font-size: 1.5em; margin-bottom: 8px; }
        .status {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            background: rgba(255,255,255,0.2);
            font-size: 0.85em;
            margin-top: 8px;
        }
        .status.online { background: #10b981; }
        .status.offline { background: #ef4444; }
        .sidebar-content { 
            padding: 20px; 
            flex: 1;
            overflow-y: auto;
        }
        .section {
            background: #334155;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #475569;
        }
        .section h2 {
            color: #60a5fa;
            margin-bottom: 12px;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .main-content {
            background: #0f172a;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .screen-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
            overflow: hidden;
        }
        #androidScreen {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }
        .screen-placeholder {
            text-align: center;
            color: #64748b;
        }
        .screen-placeholder .icon {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        .controls-bar {
            background: #1e293b;
            border-top: 1px solid #334155;
            padding: 12px 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .upload-area {
            border: 2px dashed #475569;
            border-radius: 8px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #1e293b;
        }
        .upload-area:hover {
            background: #334155;
            border-color: #60a5fa;
        }
        .upload-area.dragover {
            background: #1e40af;
            border-color: #3b82f6;
        }
        input[type="file"] { display: none; }
        .btn {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn:hover { 
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }
        .btn:active { transform: translateY(0); }
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.85em;
        }
        .btn-danger { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); }
        .btn-success { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .btn-secondary { background: #475569; }
        .package-list {
            max-height: 250px;
            overflow-y: auto;
            background: #1e293b;
            border-radius: 6px;
            border: 1px solid #475569;
        }
        .package-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            border-bottom: 1px solid #334155;
            transition: background 0.2s;
        }
        .package-item:hover { background: #334155; }
        .package-item:last-child { border-bottom: none; }
        .package-name {
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            color: #94a3b8;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .package-actions {
            display: flex;
            gap: 6px;
        }
        .terminal {
            background: #0f172a;
            color: #10b981;
            font-family: 'Courier New', monospace;
            padding: 12px;
            border-radius: 6px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 0.8em;
            line-height: 1.5;
            border: 1px solid #334155;
        }
        .terminal pre { margin: 0; white-space: pre-wrap; word-wrap: break-word; }
        .input-group {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .input-group input {
            flex: 1;
            padding: 10px;
            border: 1px solid #475569;
            border-radius: 6px;
            font-size: 0.9em;
            background: #1e293b;
            color: #e2e8f0;
        }
        .input-group input:focus {
            outline: none;
            border-color: #3b82f6;
            background: #334155;
        }
        .device-info {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }
        .info-card {
            background: #1e293b;
            padding: 12px;
            border-radius: 6px;
            border-left: 3px solid #3b82f6;
        }
        .info-label {
            font-size: 0.75em;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .info-value {
            font-size: 1em;
            font-weight: 600;
            color: #e2e8f0;
            margin-top: 4px;
        }
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideIn 0.3s ease-out;
            z-index: 1000;
            font-size: 0.9em;
        }
        .notification.success { background: #10b981; }
        .notification.error { background: #ef4444; }
        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .collapse-btn {
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            padding: 4px;
            font-size: 0.9em;
        }
        .collapse-btn:hover { color: #94a3b8; }
        .collapsible-content {
            max-height: 1000px;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .collapsible-content.collapsed {
            max-height: 0;
        }
        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
            }
            .sidebar {
                max-height: 50vh;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="header">
                <h1>🤖 Android ARM64</h1>
                <div class="status" id="status">
                    <span class="loading"></span> Checking...
                </div>
            </div>

            <div class="sidebar-content">
                <div class="device-info" id="deviceInfo" style="display:none;">
                    <div class="info-card">
                        <div class="info-label">Android</div>
                        <div class="info-value" id="androidVersion">-</div>
                    </div>
                    <div class="info-card">
                        <div class="info-label">Architecture</div>
                        <div class="info-value" id="cpuAbi">-</div>
                    </div>
                </div>

                <div class="section">
                    <h2>📦 Upload APK</h2>
                    <div class="upload-area" id="uploadArea">
                        <input type="file" id="fileInput" accept=".apk">
                        <div>
                            <p style="font-size: 2em; margin-bottom: 8px;">📱</p>
                            <p style="font-size: 0.95em; color: #60a5fa; font-weight: 500;">Drop APK or click</p>
                            <p style="color: #64748b; margin-top: 6px; font-size: 0.8em;">Max 500MB</p>
                        </div>
                    </div>
                </div>

                <div class="section">
                    <h2>
                        📱 Apps
                        <button class="btn btn-sm btn-secondary" onclick="refreshPackages()">🔄</button>
                    </h2>
                    <div class="package-list" id="packageList">
                        <p style="text-align: center; color: #64748b; padding: 16px; font-size: 0.9em;">Loading...</p>
                    </div>
                </div>

                <div class="section">
                    <h2>🖥️ Shell</h2>
                    <div class="input-group">
                        <input type="text" id="shellInput" placeholder="pm list packages">
                        <button class="btn btn-sm" onclick="executeShell()">▶️</button>
                    </div>
                    <div class="terminal" id="shellOutput" style="margin-top: 10px;">
                        <pre>Ready...</pre>
                    </div>
                </div>

                <div class="section">
                    <h2>📋 Tools</h2>
                    <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                        <button class="btn btn-sm" onclick="getLogcat()">📖 Logcat</button>
                        <button class="btn btn-sm btn-danger" onclick="clearLogcat()">🗑️ Clear</button>
                        <button class="btn btn-sm btn-success" onclick="takeScreenshot()">📸 Screenshot</button>
                    </div>
                    <div class="terminal" id="logcatOutput" style="margin-top: 10px; display: none;">
                        <pre>Logs...</pre>
                    </div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="screen-container" id="screenContainer">
                <div class="screen-placeholder">
                    <div class="icon">📱</div>
                    <p>Android Screen</p>
                    <p style="font-size: 0.9em; margin-top: 8px; color: #475569;">Connecting to scrcpy...</p>
                </div>
                <iframe id="androidScreen" style="display: none;"></iframe>
            </div>
            
            <div class="controls-bar">
                <button class="btn btn-sm" onclick="sendKey('HOME')">🏠 Home</button>
                <button class="btn btn-sm" onclick="sendKey('BACK')">◀️ Back</button>
                <button class="btn btn-sm" onclick="sendKey('APP_SWITCH')">📱 Recent</button>
                <button class="btn btn-sm" onclick="sendKey('POWER')">⚡ Power</button>
                <button class="btn btn-sm btn-secondary" onclick="rotateScreen()">🔄 Rotate</button>
            </div>
        </div>
    </div>

    <script>
        let deviceOnline = false;
        let scrcpyPort = 8000;

        // Check device status
        async function checkStatus() {
            try {
                const res = await fetch('/api/device/status');
                const data = await res.json();
                
                const statusEl = document.getElementById('status');
                const deviceInfo = document.getElementById('deviceInfo');
                
                if (data.online) {
                    deviceOnline = true;
                    statusEl.className = 'status online';
                    statusEl.textContent = '✅ Online';
                    deviceInfo.style.display = 'grid';
                    
                    document.getElementById('androidVersion').textContent = data.android_version || '-';
                    document.getElementById('cpuAbi').textContent = data.cpu_abi || '-';
                    
                    refreshPackages();
                    loadScrcpy();
                } else {
                    deviceOnline = false;
                    statusEl.className = 'status offline';
                    statusEl.textContent = '❌ Offline';
                    deviceInfo.style.display = 'none';
                }
            } catch (e) {
                console.error('Status check failed:', e);
            }
        }

        // Load scrcpy screen
        function loadScrcpy() {
            const iframe = document.getElementById('androidScreen');
            const placeholder = document.querySelector('.screen-placeholder');
            
            // Use proxy to load scrcpy
            iframe.src = '/scrcpy/';
            iframe.style.display = 'block';
            
            // Check if loaded after 5 seconds
            setTimeout(() => {
                try {
                    if (iframe.contentWindow.location.href) {
                        placeholder.style.display = 'none';
                    }
                } catch (e) {
                    // Cross-origin, assume loaded
                    placeholder.style.display = 'none';
                }
            }, 5000);
        }

        // Send key event
        async function sendKey(keycode) {
            try {
                const res = await fetch('/api/shell', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: `input keyevent KEYCODE_${keycode}` })
                });
                const data = await res.json();
                if (data.success) {
                    showNotification(`✅ ${keycode} pressed`, 'success');
                }
            } catch (e) {
                showNotification('❌ Failed to send key', 'error');
            }
        }

        // Rotate screen
        async function rotateScreen() {
            try {
                await fetch('/api/shell', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: 'settings put system user_rotation 1' })
                });
                showNotification('🔄 Screen rotated', 'success');
            } catch (e) {
                showNotification('❌ Rotation failed', 'error');
            }
        }

        // Upload area
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');

        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        async function handleFile(file) {
            if (!file.name.endsWith('.apk')) {
                showNotification('Please select an APK file', 'error');
                return;
            }

            if (!deviceOnline) {
                showNotification('Device is offline', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('apk', file);

            showNotification('Installing ' + file.name + '...', 'success');

            try {
                const res = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();

                if (data.success) {
                    showNotification('✅ APK installed successfully!', 'success');
                    refreshPackages();
                } else {
                    showNotification('❌ ' + (data.error || 'Installation failed'), 'error');
                }
            } catch (e) {
                showNotification('❌ Upload failed: ' + e.message, 'error');
            }

            fileInput.value = '';
        }

        async function refreshPackages() {
            const listEl = document.getElementById('packageList');
            listEl.innerHTML = '<p style="text-align: center; color: #64748b; padding: 16px; font-size: 0.9em;">Loading...</p>';

            try {
                const res = await fetch('/api/packages');
                const data = await res.json();

                if (data.success && data.packages.length > 0) {
                    listEl.innerHTML = data.packages.map(pkg => `
                        <div class="package-item">
                            <span class="package-name" title="${pkg}">${pkg}</span>
                            <div class="package-actions">
                                <button class="btn btn-sm btn-success" onclick="launchApp('${pkg}')">▶️</button>
                                <button class="btn btn-sm btn-danger" onclick="uninstallApp('${pkg}')">🗑️</button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    listEl.innerHTML = '<p style="text-align: center; color: #64748b; padding: 16px; font-size: 0.9em;">No apps</p>';
                }
            } catch (e) {
                listEl.innerHTML = '<p style="text-align: center; color: #ef4444; padding: 16px; font-size: 0.9em;">Failed to load</p>';
            }
        }

        async function launchApp(pkg) {
            try {
                const res = await fetch('/api/launch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ package: pkg })
                });
                const data = await res.json();

                if (data.success) {
                    showNotification('✅ Launched ' + pkg, 'success');
                } else {
                    showNotification('❌ ' + (data.error || 'Launch failed'), 'error');
                }
            } catch (e) {
                showNotification('❌ Launch failed', 'error');
            }
        }

        async function uninstallApp(pkg) {
            if (!confirm('Uninstall ' + pkg + '?')) return;

            try {
                const res = await fetch('/api/uninstall', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ package: pkg })
                });
                const data = await res.json();

                if (data.success) {
                    showNotification('✅ Uninstalled ' + pkg, 'success');
                    refreshPackages();
                } else {
                    showNotification('❌ ' + (data.error || 'Uninstall failed'), 'error');
                }
            } catch (e) {
                showNotification('❌ Uninstall failed', 'error');
            }
        }

        async function executeShell() {
            const input = document.getElementById('shellInput');
            const output = document.getElementById('shellOutput');
            const command = input.value.trim();

            if (!command) return;

            output.innerHTML = '<pre>Executing: ' + command + '\n\n<span class="loading"></span></pre>';

            try {
                const res = await fetch('/api/shell', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command })
                });
                const data = await res.json();

                output.innerHTML = '<pre>$ ' + command + '\n\n' + 
                    (data.output || data.error || 'No output') + '</pre>';
            } catch (e) {
                output.innerHTML = '<pre>Error: ' + e.message + '</pre>';
            }
        }

        async function getLogcat() {
            const output = document.getElementById('logcatOutput');
            output.style.display = 'block';
            output.innerHTML = '<pre><span class="loading"></span> Loading...</pre>';

            try {
                const res = await fetch('/api/logcat');
                const data = await res.json();

                output.innerHTML = '<pre>' + (data.output || 'No logs') + '</pre>';
            } catch (e) {
                output.innerHTML = '<pre>Error: ' + e.message + '</pre>';
            }
        }

        async function clearLogcat() {
            try {
                await fetch('/api/clear-logcat', { method: 'POST' });
                showNotification('✅ Logcat cleared', 'success');
                const output = document.getElementById('logcatOutput');
                output.style.display = 'none';
            } catch (e) {
                showNotification('❌ Failed', 'error');
            }
        }

        async function takeScreenshot() {
            showNotification('📸 Taking screenshot...', 'success');
            try {
                const res = await fetch('/api/screenshot');
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'screenshot.png';
                a.click();
                showNotification('✅ Screenshot saved!', 'success');
            } catch (e) {
                showNotification('❌ Screenshot failed', 'error');
            }
        }

        function showNotification(message, type) {
            const notif = document.createElement('div');
            notif.className = 'notification ' + type;
            notif.textContent = message;
            document.body.appendChild(notif);

            setTimeout(() => {
                notif.style.animation = 'slideIn 0.3s ease-out reverse';
                setTimeout(() => notif.remove(), 300);
            }, 3000);
        }

        // Enter key for shell
        document.getElementById('shellInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') executeShell();
        });

        // Initial check and periodic refresh
        checkStatus();
        setInterval(checkStatus, 10000);
    </script>
</body>
</html>
